<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen">

    <!-- Header -->
    <header class="py-6 border-b border-gray-700">
        <h1 class="text-4xl font-bold text-center">
            📊 Portfolio
        </h1>
        <p class="text-center text-gray-400 mt-2">
            Market Sectors Overview
        </p>
    </header>

    <!-- Main Content -->
    <main class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6">

        <!-- Bank Sector Card -->
        <a href="/banks/"
           class="bg-gray-800 p-6 rounded-lg hover:bg-blue-600 transition">
            <h2 class="text-2xl font-semibold">🏦 Bank Sector</h2>
            <p class="text-gray-400 mt-2">
                View major banking stocks and analysis
            </p>
        </a>

        <!-- Placeholder Sectors -->
        <div class="bg-gray-800 p-6 rounded-lg opacity-50">
            <h2 class="text-2xl font-semibold">💻 IT Sector</h2>
            <p class="text-gray-400 mt-2">Coming soon</p>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg opacity-50">
            <h2 class="text-2xl font-semibold">🧪 Pharma Sector</h2>
            <p class="text-gray-400 mt-2">Coming soon</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="py-6 border-t border-gray-700 text-center text-gray-400">
        © 2026 Prithviraj | Stock Portfolio Dashboard
    </footer>

</body>
</html>
